name: Provider E2E Tests

on:
  schedule:
    - cron: '30 0 * * *'  # nightly
  workflow_dispatch:
    inputs:
      gtc_version:
        description: 'gtc version to test'
        default: 'latest'
        required: false
      provider_scope:
        description: 'Provider scope to test'
        default: 'all'
        required: false
        type: choice
        options:
          - dummy          # messaging-dummy + events-dummy (no credentials)
          - messaging      # all messaging providers
          - events         # all event providers
          - all            # all providers

permissions:
  contents: read

# Inputs come from workflow_dispatch, with defaults for nightly runs

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GTC_VERSION: ${{ github.event.inputs.gtc_version || 'latest' }}
  PROVIDER_SCOPE: ${{ github.event.inputs.provider_scope || 'all' }}

jobs:
  # ==========================================================================
  # Dummy Provider Tests (no credentials required)
  # Full cycle: setup → start → HTTP ingress → verify response → stop
  # ==========================================================================
  dummy-providers:
    name: Dummy Providers (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux (x64)
            runner: ubuntu-24.04
          - label: macOS 15 (arm64)
            runner: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          # greentic-bundle's `wizard apply` needs mksquashfs to emit the
          # .gtbundle artefact. Not preinstalled on either GHA runner.
          set -euo pipefail
          case "$(uname -s)" in
            Linux)
              sudo apt-get update -qq
              sudo apt-get install -y -qq squashfs-tools jq lsof
              ;;
            Darwin)
              brew install squashfs jq 2>/dev/null || brew upgrade squashfs jq || true
              ;;
          esac

      - name: Bootstrap toolchain
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain 1.95.0
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0

      - name: Install gtc CLI
        shell: bash
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          if [[ -z "${GTC_VERSION}" || "${GTC_VERSION}" == "latest" ]]; then
            cargo binstall -y gtc
          else
            cargo binstall -y "gtc@${GTC_VERSION}"
          fi
          gtc --version
          gtc install

      - name: Prepare test workspace
        shell: bash
        run: |
          set -euo pipefail
          root="$(mktemp -d)"
          echo "E2E_ROOT=${root}" >> "$GITHUB_ENV"
          echo "E2E_BUNDLE_DIR=${root}/bundle" >> "$GITHUB_ENV"
          mkdir -p "${root}/bundle"

      - name: Create bundle with dummy providers
        shell: bash
        run: |
          set -euo pipefail
          # Render the wizard-answers fixture with the runtime-allocated
          # bundle dir, then ask `gtc wizard` to emit a current-schema
          # bundle.yaml (schema_version:1 with extension_providers:list).
          # The old hand-rolled greentic.demo.yaml shape is no longer parsed
          # by gtc start — the runtime logged "Ready." but bound no HTTP
          # ingress because extension_providers were never resolved.
          ANSWERS="${E2E_ROOT}/wizard-answers.json"
          python3 - <<PY
          import json, pathlib
          tpl = pathlib.Path("fixtures/wizard-answers/e2e-dummy-bundle.json").read_text()
          tpl = tpl.replace("{{BUNDLE_DIR}}", "${E2E_BUNDLE_DIR}")
          pathlib.Path("${ANSWERS}").write_text(tpl)
          PY
          gtc wizard --answers "${ANSWERS}"

      - name: Setup providers
        shell: bash
        run: |
          # Dummy providers don't require per-provider config — the wizard
          # step above already registered them in bundle.yaml. Setup is a
          # no-op here, kept for shape parity with the messaging / events
          # matrices which still seed credentials via setup-answers.
          echo "Dummy providers: setup skipped (registration done at wizard step)"

      - name: Start services
        shell: bash
        run: |
          set -euo pipefail

          gtc start "${E2E_BUNDLE_DIR}" \
            --cloudflared off \
            --ngrok off \
            > "${E2E_ROOT}/start.log" 2>&1 &
          echo $! > "${E2E_ROOT}/start.pid"

          echo "Waiting for services to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/ > /dev/null 2>&1 || \
               curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/ 2>/dev/null | grep -qE "^[2-4]"; then
              echo "PASS: HTTP endpoint ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "WARNING: HTTP endpoint not responding after 30s, continuing anyway"
              cat "${E2E_ROOT}/start.log"
            fi
            sleep 1
          done

          # Extra settle time
          sleep 3

          START_PID=$(cat "${E2E_ROOT}/start.pid")
          if kill -0 ${START_PID} 2>/dev/null; then
            echo "PASS: Services running (PID: ${START_PID})"
          else
            echo "FAIL: Services exited unexpectedly"
            cat "${E2E_ROOT}/start.log"
            exit 1
          fi

      - name: "Test: messaging-dummy ingress"
        shell: bash
        run: |
          set -euo pipefail

          echo "Sending test message to messaging-dummy..."
          RESPONSE=$(curl -sf -w "\n%{http_code}" \
            -X POST http://127.0.0.1:8080/v1/messaging/ingress/messaging-dummy/demo/default \
            -H "Content-Type: application/json" \
            -d '{"text": "e2e test message", "from": {"id": "e2e-tester", "name": "E2E"}}' \
            2>&1) || true

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: ${HTTP_CODE}"
          echo "Response: ${BODY}"

          # Per CLAUDE.md: "Provider tests accept 2xx-4xx HTTP responses
          # as passing (provider processed the request). Only 5xx or
          # connection failures count as errors." messaging-dummy only
          # declares `send`/`qa-spec`/`apply-answers`/`i18n-keys` ops — no
          # `ingest_http` — so the server correctly refuses with
          # 404 "domain disabled". That still proves the runtime is up and
          # routing; treat it as PASS.
          if [[ "$HTTP_CODE" =~ ^[234][0-9][0-9]$ ]]; then
            echo "PASS: messaging-dummy returned ${HTTP_CODE} (server reachable, routed)"
          else
            echo "FAIL: messaging-dummy returned ${HTTP_CODE}"
            cat "${E2E_ROOT}/start.log"
            exit 1
          fi

      - name: "Test: events-dummy ingress"
        shell: bash
        run: |
          set -euo pipefail

          echo "Sending test event to events-dummy..."
          RESPONSE=$(curl -sf -w "\n%{http_code}" \
            -X POST http://127.0.0.1:8080/v1/events/ingress/events-dummy/demo/default \
            -H "Content-Type: application/json" \
            -d '{"event_type": "e2e.test", "data": {"message": "hello from e2e"}}' \
            2>&1) || true

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: ${HTTP_CODE}"
          echo "Response: ${BODY}"

          # Same 2xx-4xx spec. events-dummy likewise has no ingest_http op;
          # a 4xx with an "events domain disabled" / similar body is still
          # a successful reachability + routing check.
          if [[ "$HTTP_CODE" =~ ^[234][0-9][0-9]$ ]]; then
            echo "PASS: events-dummy returned ${HTTP_CODE} (server reachable, routed)"
          else
            echo "FAIL: events-dummy returned ${HTTP_CODE}"
            cat "${E2E_ROOT}/start.log"
            exit 1
          fi

      - name: Stop services
        if: always()
        shell: bash
        run: |
          if [[ -f "${E2E_ROOT}/start.pid" ]]; then
            START_PID=$(cat "${E2E_ROOT}/start.pid")
            if kill -0 ${START_PID} 2>/dev/null; then
              kill -TERM ${START_PID} || true
              wait ${START_PID} 2>/dev/null || true
              echo "PASS: Services stopped"
            fi
          fi

  # ==========================================================================
  # Messaging Provider Tests (requires secrets)
  # Full cycle: setup → start → HTTP ingress → verify response → stop
  # ==========================================================================
  messaging-providers:
    name: ${{ matrix.provider }}
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.provider_scope == 'messaging' ||
      github.event.inputs.provider_scope == 'all'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        provider:
          - messaging-telegram
          - messaging-slack
          - messaging-teams
          - messaging-webex
          - messaging-whatsapp
          - messaging-email
          - messaging-webchat-gui

    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: secrets
        shell: bash
        env:
          PROVIDER: ${{ matrix.provider }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_ID: ${{ secrets.SLACK_APP_ID }}
          MS_BOT_APP_ID: ${{ secrets.MS_BOT_APP_ID }}
          MS_BOT_APP_PASSWORD: ${{ secrets.MS_BOT_APP_PASSWORD }}
          WEBEX_BOT_TOKEN: ${{ secrets.WEBEX_BOT_TOKEN }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          MS_GRAPH_CLIENT_ID: ${{ secrets.MS_GRAPH_CLIENT_ID }}
          MS_GRAPH_CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          WEBCHAT_JWT_SIGNING_KEY: ${{ secrets.WEBCHAT_JWT_SIGNING_KEY }}
        run: |
          # Report missing credentials as a skip signal instead of a hard
          # failure. Nightly runs on repos that don't have provider secrets
          # wired up (which is every repo by default) should surface a
          # "skipped — no credentials" result rather than a red workflow
          # status for something no one can fix without admin access to
          # the secrets store. Set present=false on miss; downstream steps
          # gate on that output.
          present=true
          reason=""
          case "$PROVIDER" in
            messaging-telegram)
              [[ -n "$TELEGRAM_BOT_TOKEN" ]] || { present=false; reason="TELEGRAM_BOT_TOKEN"; }
              ;;
            messaging-slack)
              [[ -n "$SLACK_BOT_TOKEN" ]] || { present=false; reason="SLACK_BOT_TOKEN"; }
              ;;
            messaging-teams)
              [[ -n "$MS_BOT_APP_ID" && -n "$MS_BOT_APP_PASSWORD" ]] || { present=false; reason="MS_BOT_APP_ID / MS_BOT_APP_PASSWORD"; }
              ;;
            messaging-webex)
              [[ -n "$WEBEX_BOT_TOKEN" ]] || { present=false; reason="WEBEX_BOT_TOKEN"; }
              ;;
            messaging-whatsapp)
              [[ -n "$WHATSAPP_TOKEN" && -n "$WHATSAPP_PHONE_NUMBER_ID" ]] || { present=false; reason="WHATSAPP_TOKEN / WHATSAPP_PHONE_NUMBER_ID"; }
              ;;
            messaging-email)
              [[ -n "$MS_GRAPH_CLIENT_ID" && -n "$MS_GRAPH_CLIENT_SECRET" ]] || { present=false; reason="MS_GRAPH_CLIENT_ID / MS_GRAPH_CLIENT_SECRET"; }
              ;;
            messaging-webchat-gui)
              [[ -n "$WEBCHAT_JWT_SIGNING_KEY" ]] || { present=false; reason="WEBCHAT_JWT_SIGNING_KEY"; }
              ;;
          esac

          echo "present=${present}" >> "$GITHUB_OUTPUT"
          if [[ "$present" == "true" ]]; then
            echo "Required secrets present for ${PROVIDER}"
          else
            echo "::warning::Skipping ${PROVIDER} — missing ${reason}. Configure the secrets in repo settings to enable this matrix entry."
          fi

      - name: Bootstrap toolchain
        if: steps.secrets.outputs.present == 'true'
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain 1.95.0
          source "$HOME/.cargo/env"
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y gtc
          gtc install

      - name: Prepare and start services
        if: steps.secrets.outputs.present == 'true'
        shell: bash
        env:
          PROVIDER: ${{ matrix.provider }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL || 'http://localhost:8080' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_ID: ${{ secrets.SLACK_APP_ID }}
          SLACK_CONFIGURATION_TOKEN: ${{ secrets.SLACK_CONFIGURATION_TOKEN }}
          MS_BOT_APP_ID: ${{ secrets.MS_BOT_APP_ID }}
          MS_BOT_APP_PASSWORD: ${{ secrets.MS_BOT_APP_PASSWORD }}
          WEBEX_BOT_TOKEN: ${{ secrets.WEBEX_BOT_TOKEN }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          EMAIL_FROM_ADDRESS: ${{ secrets.EMAIL_FROM_ADDRESS }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          MS_GRAPH_CLIENT_ID: ${{ secrets.MS_GRAPH_CLIENT_ID }}
          MS_GRAPH_CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          WEBCHAT_JWT_SIGNING_KEY: ${{ secrets.WEBCHAT_JWT_SIGNING_KEY }}
        run: |
          set -euo pipefail

          # Install system deps needed by greentic-bundle's wizard apply.
          sudo apt-get update -qq
          sudo apt-get install -y -qq squashfs-tools jq lsof

          ROOT="$(mktemp -d)"
          echo "E2E_ROOT=${ROOT}" >> "$GITHUB_ENV"

          BUNDLE_DIR="${ROOT}/bundle"
          mkdir -p "${BUNDLE_DIR}"

          # Create bundle via gtc wizard (modern schema_version:1 bundle.yaml).
          # The legacy `providers: { messaging: { <name>: { pack: ... } } }`
          # shape is no longer parsed by gtc start, so the runtime silently
          # binds no ingress. Render the parametrised fixture, then hand off
          # to gtc wizard to emit the normalised bundle.
          ANSWERS="${ROOT}/wizard-answers.json"
          python3 - <<PY
          import pathlib
          tpl = pathlib.Path("fixtures/wizard-answers/e2e-messaging-provider.json").read_text()
          tpl = tpl.replace("{{PROVIDER}}", "${PROVIDER}")
          tpl = tpl.replace("{{BUNDLE_DIR}}", "${BUNDLE_DIR}")
          pathlib.Path("${ANSWERS}").write_text(tpl)
          PY
          gtc wizard --answers "${ANSWERS}"

          # Create setup answers from fixture with env substitution
          envsubst < "fixtures/setup-answers/${PROVIDER}.json" > "${ROOT}/setup-answers.json"

          # Setup
          gtc setup --no-ui --answers "${ROOT}/setup-answers.json" "${BUNDLE_DIR}" \
            < /dev/null || echo "Setup exited with: $?"

          # Start
          gtc start "${BUNDLE_DIR}" \
            --cloudflared off \
            --ngrok off \
            > "${ROOT}/start.log" 2>&1 &
          echo $! > "${ROOT}/start.pid"

          # Wait for HTTP endpoint
          echo "Waiting for services to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/ > /dev/null 2>&1 || \
               curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/ 2>/dev/null | grep -qE "^[2-4]"; then
              echo "PASS: HTTP endpoint ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "WARNING: HTTP endpoint not responding after 30s"
              cat "${ROOT}/start.log"
            fi
            sleep 1
          done
          sleep 3

          START_PID=$(cat "${ROOT}/start.pid")
          if kill -0 ${START_PID} 2>/dev/null; then
            echo "PASS: ${PROVIDER} services running (PID: ${START_PID})"
          else
            echo "FAIL: ${PROVIDER} services exited unexpectedly"
            cat "${ROOT}/start.log"
            exit 1
          fi

      - name: "Test: messaging ingress"
        if: steps.secrets.outputs.present == 'true'
        shell: bash
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          set -euo pipefail

          # Build provider-specific test payload
          case "$PROVIDER" in
            messaging-telegram)
              PAYLOAD='{"update_id":1,"message":{"message_id":1,"date":1700000000,"from":{"id":123,"is_bot":false,"first_name":"E2E"},"chat":{"id":123,"type":"private"},"text":"e2e test"}}'
              ;;
            messaging-slack)
              PAYLOAD='{"type":"event_callback","event":{"type":"message","text":"e2e test","user":"U123","channel":"C123","ts":"1700000000.000001"}}'
              ;;
            messaging-teams)
              PAYLOAD='{"type":"message","id":"1","timestamp":"2024-01-01T00:00:00Z","channelId":"msteams","from":{"id":"e2e","name":"E2E"},"conversation":{"id":"conv1"},"recipient":{"id":"bot1"},"text":"e2e test","serviceUrl":"https://smba.trafficmanager.net/teams/"}'
              ;;
            messaging-webex)
              PAYLOAD='{"id":"msg1","name":"e2e","targetUrl":"http://localhost","resource":"messages","event":"created","data":{"id":"msg1","roomId":"room1","personId":"person1","personEmail":"e2e@test.com","text":"e2e test","created":"2024-01-01T00:00:00.000Z"}}'
              ;;
            messaging-whatsapp)
              PAYLOAD='{"object":"whatsapp_business_account","entry":[{"id":"123","changes":[{"value":{"messaging_product":"whatsapp","metadata":{"phone_number_id":"123"},"messages":[{"from":"123456","id":"msg1","timestamp":"1700000000","type":"text","text":{"body":"e2e test"}}]},"field":"messages"}]}]}'
              ;;
            messaging-email)
              PAYLOAD='{"value":[{"changeType":"created","resource":"me/messages/msg1","resourceData":{"id":"msg1"}}]}'
              ;;
            messaging-webchat-gui)
              PAYLOAD='{"type":"message","id":"1","from":{"id":"e2e","name":"E2E"},"text":"e2e test"}'
              ;;
            *)
              PAYLOAD='{"text":"e2e test"}'
              ;;
          esac

          echo "Sending test message to ${PROVIDER}..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "http://127.0.0.1:8080/v1/messaging/ingress/${PROVIDER}/demo/default" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            2>&1) || true

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: ${HTTP_CODE}"
          echo "Response: ${BODY}"

          # Accept 2xx (success) or 4xx (provider processed but rejected payload)
          # Only 5xx or connection failures are real errors
          if [[ "$HTTP_CODE" =~ ^[2-4][0-9][0-9]$ ]]; then
            echo "PASS: ${PROVIDER} ingress responded with ${HTTP_CODE}"
          else
            echo "FAIL: ${PROVIDER} ingress failed with ${HTTP_CODE}"
            cat "${E2E_ROOT}/start.log"
            exit 1
          fi

      - name: Stop services
        if: always()
        shell: bash
        run: |
          if [[ -f "${E2E_ROOT}/start.pid" ]]; then
            START_PID=$(cat "${E2E_ROOT}/start.pid")
            if kill -0 ${START_PID} 2>/dev/null; then
              kill -TERM ${START_PID} || true
              wait ${START_PID} 2>/dev/null || true
              echo "PASS: Services stopped"
            fi
          fi

  # ==========================================================================
  # Event Provider Tests (requires secrets)
  # Full cycle: setup → start → HTTP ingress → verify response → stop
  # ==========================================================================
  event-providers:
    name: ${{ matrix.provider }}
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.provider_scope == 'events' ||
      github.event.inputs.provider_scope == 'all'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        provider:
          - events-webhook
          - events-timer
          - events-email-sendgrid
          - events-sms-twilio

    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: secrets
        shell: bash
        env:
          PROVIDER: ${{ matrix.provider }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        run: |
          # Same pattern as messaging-providers: missing secrets → skip
          # signal (present=false), not hard fail. Downstream steps gate
          # on the output.
          present=true
          reason=""
          case "$PROVIDER" in
            events-webhook|events-timer)
              echo "No secrets required for $PROVIDER"
              ;;
            events-email-sendgrid)
              [[ -n "$SENDGRID_API_KEY" ]] || { present=false; reason="SENDGRID_API_KEY"; }
              ;;
            events-sms-twilio)
              [[ -n "$TWILIO_ACCOUNT_SID" && -n "$TWILIO_AUTH_TOKEN" ]] || { present=false; reason="TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN"; }
              ;;
          esac
          echo "present=${present}" >> "$GITHUB_OUTPUT"
          if [[ "$present" != "true" ]]; then
            echo "::warning::Skipping ${PROVIDER} — missing ${reason}. Configure the secrets in repo settings to enable this matrix entry."
          fi

      - name: Bootstrap toolchain
        if: steps.secrets.outputs.present == 'true'
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain 1.95.0
          source "$HOME/.cargo/env"
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y gtc
          gtc install

      - name: Prepare and start services
        if: steps.secrets.outputs.present == 'true'
        shell: bash
        env:
          PROVIDER: ${{ matrix.provider }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL || 'http://localhost:8080' }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
        run: |
          set -euo pipefail

          sudo apt-get update -qq
          sudo apt-get install -y -qq squashfs-tools jq lsof

          ROOT="$(mktemp -d)"
          echo "E2E_ROOT=${ROOT}" >> "$GITHUB_ENV"

          BUNDLE_DIR="${ROOT}/bundle"
          mkdir -p "${BUNDLE_DIR}"

          # Create bundle via gtc wizard (modern schema_version:1 bundle.yaml).
          ANSWERS="${ROOT}/wizard-answers.json"
          python3 - <<PY
          import pathlib
          tpl = pathlib.Path("fixtures/wizard-answers/e2e-events-provider.json").read_text()
          tpl = tpl.replace("{{PROVIDER}}", "${PROVIDER}")
          tpl = tpl.replace("{{BUNDLE_DIR}}", "${BUNDLE_DIR}")
          pathlib.Path("${ANSWERS}").write_text(tpl)
          PY
          gtc wizard --answers "${ANSWERS}"

          # Create setup answers from fixture with env substitution
          envsubst < "fixtures/setup-answers/${PROVIDER}.json" > "${ROOT}/setup-answers.json"

          # Setup
          gtc setup --no-ui --answers "${ROOT}/setup-answers.json" "${BUNDLE_DIR}" \
            < /dev/null || echo "Setup exited with: $?"

          # Start
          gtc start "${BUNDLE_DIR}" \
            --cloudflared off \
            --ngrok off \
            > "${ROOT}/start.log" 2>&1 &
          echo $! > "${ROOT}/start.pid"

          # Wait for HTTP endpoint
          echo "Waiting for services to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/ > /dev/null 2>&1 || \
               curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/ 2>/dev/null | grep -qE "^[2-4]"; then
              echo "PASS: HTTP endpoint ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "WARNING: HTTP endpoint not responding after 30s"
              cat "${ROOT}/start.log"
            fi
            sleep 1
          done
          sleep 3

          START_PID=$(cat "${ROOT}/start.pid")
          if kill -0 ${START_PID} 2>/dev/null; then
            echo "PASS: ${PROVIDER} services running (PID: ${START_PID})"
          else
            echo "FAIL: ${PROVIDER} services exited unexpectedly"
            cat "${ROOT}/start.log"
            exit 1
          fi

      - name: "Test: event ingress"
        if: steps.secrets.outputs.present == 'true' && matrix.provider != 'events-timer'
        shell: bash
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          set -euo pipefail

          # Build provider-specific test payload
          case "$PROVIDER" in
            events-webhook)
              PAYLOAD='{"event_type": "e2e.test", "data": {"message": "hello from e2e"}}'
              ;;
            events-email-sendgrid)
              PAYLOAD='[{"email":"test@example.com","timestamp":1700000000,"event":"delivered","sg_event_id":"evt1","sg_message_id":"msg1"}]'
              ;;
            events-sms-twilio)
              PAYLOAD='From=%2B1234567890&To=%2B0987654321&Body=e2e+test&MessageSid=SM123&AccountSid=AC123'
              ;;
            *)
              PAYLOAD='{"event_type": "e2e.test", "data": {}}'
              ;;
          esac

          echo "Sending test event to ${PROVIDER}..."

          # Twilio uses form-urlencoded
          if [[ "$PROVIDER" == "events-sms-twilio" ]]; then
            CONTENT_TYPE="application/x-www-form-urlencoded"
          else
            CONTENT_TYPE="application/json"
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "http://127.0.0.1:8080/v1/events/ingress/${PROVIDER}/demo/default" \
            -H "Content-Type: ${CONTENT_TYPE}" \
            -d "${PAYLOAD}" \
            2>&1) || true

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: ${HTTP_CODE}"
          echo "Response: ${BODY}"

          # Accept 2xx (success) or 4xx (provider processed but rejected payload)
          if [[ "$HTTP_CODE" =~ ^[2-4][0-9][0-9]$ ]]; then
            echo "PASS: ${PROVIDER} ingress responded with ${HTTP_CODE}"
          else
            echo "FAIL: ${PROVIDER} ingress failed with ${HTTP_CODE}"
            cat "${E2E_ROOT}/start.log"
            exit 1
          fi

      - name: "Test: timer is scheduled"
        if: steps.secrets.outputs.present == 'true' && matrix.provider == 'events-timer'
        shell: bash
        run: |
          echo "events-timer uses scheduled triggers, not HTTP ingress"
          echo "Verifying service is running and processing timer events..."

          if grep -qE "timer|schedule|tick|cron" "${E2E_ROOT}/start.log" 2>/dev/null; then
            echo "PASS: Timer indicators found in logs"
          else
            echo "INFO: No timer indicators yet (may need longer runtime)"
            echo "Log contents:"
            cat "${E2E_ROOT}/start.log"
          fi
          echo "PASS: events-timer service is operational"

      - name: Stop services
        if: always()
        shell: bash
        run: |
          if [[ -f "${E2E_ROOT}/start.pid" ]]; then
            START_PID=$(cat "${E2E_ROOT}/start.pid")
            if kill -0 ${START_PID} 2>/dev/null; then
              kill -TERM ${START_PID} || true
              wait ${START_PID} 2>/dev/null || true
              echo "PASS: Services stopped"
            fi
          fi
