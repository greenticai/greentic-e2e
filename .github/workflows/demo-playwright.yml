name: Nightly demo Playwright e2e

on:
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC, after nightly-e2e (00:00) & cloud-demo (02:00)
  workflow_dispatch:
    inputs:
      gtc_channel:
        description: 'gtc channel(s)'
        type: choice
        options: [both, stable, dev]
        default: both
      demo_filter:
        description: 'comma-separated demo names, or "all"'
        default: 'all'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: stable-linux
            runner: ubuntu-24.04
            channel: stable
          - label: dev-linux
            runner: ubuntu-24.04
            channel: dev
          # stable-macos is intentionally dropped from PR-1 matrix because
          # `gtc install` falls back to `greentic-setup@0.5.1` on macOS
          # (Maarten's Fix 2 `--non-interactive` only ships in 0.5.2 and
          # the macOS aarch64 artifact for 0.5.2 is missing/broken in
          # the GitHub release for the greentic-setup repo). Restore the
          # cell once the upstream artifact is published. See PR-1
          # punch-list item #6.
    env:
      GTC_CHANNEL: ${{ matrix.channel }}
      DEMO_FILTER: ${{ inputs.demo_filter || 'all' }}
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap Rust 1.95 + wasm32-wasip2
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain 1.95.0
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0
          rustup target add wasm32-wasip2 --toolchain 1.95.0
          rustc --version

      - name: Install OS deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y squashfs-tools jq

      - name: Install gtc (channel = ${{ matrix.channel }})
        shell: bash
        run: bash playwright/scripts/bootstrap-gtc.sh "${GTC_CHANNEL}"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: playwright/package-lock.json

      - name: Install npm deps
        working-directory: playwright
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: playwright
        env:
          GTC_BIN: gtc-${{ matrix.channel }}
          DEMO_FILTER: ${{ env.DEMO_FILTER }}
        run: npx playwright test --project="${GTC_CHANNEL}"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.label }}
          path: playwright/playwright-report/
          retention-days: 14

      - name: Upload failures (traces, videos, gtc logs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures-${{ matrix.label }}
          path: |
            playwright/test-results/
            playwright/tmp/**/gtc-*.log
          retention-days: 14
