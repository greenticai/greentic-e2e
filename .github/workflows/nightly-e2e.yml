name: Nightly e2e gtc install/wizard

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      gtc_version:
        description: 'gtc version to test'
        default: 'latest'
        required: false
      greentic_tenant:
        description: 'Tenant name for gtc install --tenant'
        default: '3point'
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GTC_VERSION: ${{ github.event.inputs.gtc_version || 'latest' }}
  GREENTIC_TENANT: ${{ github.event.inputs.greentic_tenant || vars.GREENTIC_TENANT || '3point' }}

jobs:
  e2e-tests:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux (x64)
            os: linux
            runner: ubuntu-24.04
            arch: x64
          - label: Linux (arm64)
            os: linux
            runner: ubuntu-24.04-arm
            arch: arm64
          - label: macOS 15 (arm64)
            os: macos-15
            runner: macos-15
            arch: arm64
          - label: macOS 15 (x64)
            os: macos-15
            runner: macos-15-intel
            arch: x64
          - label: Windows (x64)
            os: windows
            runner: windows-latest
            arch: x64
          - label: Windows (arm64)
            os: windows
            runner: windows-11-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap toolchain
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v rustup >/dev/null 2>&1; then
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              curl -fsSL -o rustup-init.exe https://win.rustup.rs/x86_64
              ./rustup-init.exe -y --profile minimal --default-toolchain 1.91.0
              export PATH="$HOME/.cargo/bin:$PATH"
            else
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain 1.91.0
              export PATH="$HOME/.cargo/bin:$PATH"
            fi
          fi

          rustup toolchain install 1.91.0 --profile minimal
          rustup default 1.91.0
          rustup target add wasm32-wasip2 --toolchain 1.91.0

          rustc --version
          cargo --version

      - name: Install cargo-binstall
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cargo install cargo-binstall --locked
          else
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          fi

      - name: Install gtc CLI
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          if [[ -z "${GTC_VERSION}" || "${GTC_VERSION}" == "latest" ]]; then
            cargo binstall -y gtc
          else
            cargo binstall -y "gtc@${GTC_VERSION}"
          fi

      - name: Verify gtc version
        shell: bash
        run: |
          gtc --version

      - name: Run gtc public install
        id: public_install
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          gtc install >"${RUNNER_TEMP}/gtc-public-install.log" 2>&1 || {
            cat "${RUNNER_TEMP}/gtc-public-install.log"
            exit 1
          }

      - name: Run gtc doctor
        id: public_doctor
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          gtc doctor >"${RUNNER_TEMP}/gtc-doctor.log" 2>&1 || {
            cat "${RUNNER_TEMP}/gtc-doctor.log"
            exit 1
          }

      - name: Diagnose public install failure
        if: ${{ always() && steps.public_install.outcome != 'success' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "whoami: $(whoami)"
          echo "HOME: ${HOME}"
          echo "CARGO_HOME: ${CARGO_HOME:-<unset>}"
          echo "PATH: ${PATH}"

          if command -v greentic-deployer >/dev/null 2>&1; then
            deployer_bin="$(command -v greentic-deployer)"
            deployer_dir="$(dirname "$deployer_bin")"
            echo "greentic-deployer binary: ${deployer_bin}"
            greentic-deployer --version || true
            echo "Listing deployer sibling dist dir (${deployer_dir}/dist):"
            ls -la "${deployer_dir}/dist" || true
          else
            echo "greentic-deployer binary not found in PATH"
          fi

          echo "Listing ~/.cargo/bin/dist:"
          ls -la "${HOME}/.cargo/bin/dist" || true
          echo "Listing /root/.cargo/bin/dist:"
          ls -la /root/.cargo/bin/dist || true

          echo "Searching for terraform.gtpack under home and /root (first 50 hits):"
          find "${HOME}" /root -type f -name terraform.gtpack 2>/dev/null | head -n 50 || true

      - name: Prepare wizard test workspace
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          # Shared wizard inputs live in fixtures/wizard/e2e.env.
          set -a
          source fixtures/wizard/e2e.env
          set +a

          root="$(mktemp -d "${RUNNER_TEMP:-${TMPDIR:-/tmp}}/gtc-wizard-e2e.XXXXXX")"
          pack_dir="${root}/${WIZARD_PACK_SUBDIR}"
          replay_answers="${root}/replay-answers.json"
          pack_flow_plan="${root}/pack-flow-plan.json"
          pack_launcher_apply="${root}/pack-launcher-apply.json"
          pack_launcher_delegate="${root}/pack-launcher-delegate-flow.json"
          pack_test_dir="${root}/pack-under-test"
          demo_app_pack_dir="${root}/demo-app-pack"
          bundle_complex_answers="${root}/bundle-complex-answers.json"
          bundle_complex_delegate_answers="${root}/bundle-complex-delegate-answers.json"
          bundle_complex_dir="${root}/bundle-complex"

          cp -R fixtures/packs/demo-app-pack "$demo_app_pack_dir"

          {
            echo "WIZARD_E2E_ROOT=${root}"
            echo "WIZARD_PACK_ID=${WIZARD_PACK_ID}"
            echo "WIZARD_PACK_DIR=${pack_dir}"
            echo "WIZARD_PACK_TEST_DIR=${pack_test_dir}"
            echo "WIZARD_PACK_FLOW_PLAN=${pack_flow_plan}"
            echo "WIZARD_PACK_LAUNCHER_APPLY=${pack_launcher_apply}"
            echo "WIZARD_PACK_LAUNCHER_DELEGATE=${pack_launcher_delegate}"
            echo "WIZARD_DEMO_APP_PACK_DIR=${demo_app_pack_dir}"
            echo "WIZARD_BUNDLE_COMPLEX_ANSWERS=${bundle_complex_answers}"
            echo "WIZARD_BUNDLE_COMPLEX_DELEGATE_ANSWERS=${bundle_complex_delegate_answers}"
            echo "WIZARD_BUNDLE_COMPLEX_DIR=${bundle_complex_dir}"
            echo "WIZARD_BUNDLE_NAME=${WIZARD_BUNDLE_NAME}"
            echo "WIZARD_BUNDLE_ID=${WIZARD_BUNDLE_ID}"
            echo "WIZARD_BUNDLE_DIR=${root}/bundle"
            echo "WIZARD_EMIT_FILE=${root}/emitted-answers.json"
            echo "WIZARD_EMIT_LOG=${root}/emit-answers.log"
            echo "WIZARD_REPLAY_ANSWERS=${replay_answers}"
          } >>"$GITHUB_ENV"

          sed \
            -e "s|__WIZARD_PACK_DIR__|${pack_dir}|g" \
            -e "s|__WIZARD_BUNDLE_NAME__|${WIZARD_BUNDLE_NAME}|g" \
            -e "s|__WIZARD_BUNDLE_ID__|${WIZARD_BUNDLE_ID}|g" \
            -e "s|__WIZARD_BUNDLE_DIR__|${root}/bundle|g" \
            fixtures/wizard/replay-answers.template.json >"$replay_answers"

          cp fixtures/wizard/pack_flow_plan.template.json "$pack_flow_plan"

          sed \
            -e "s|__WIZARD_BUNDLE_COMPLEX_DIR__|${bundle_complex_dir}|g" \
            -e "s|__WIZARD_DEMO_APP_PACK_DIR__|${demo_app_pack_dir}|g" \
            fixtures/wizard/bundle_complex.template.json >"$bundle_complex_answers"

          jq '.answers.delegate_answer_document' "$bundle_complex_answers" >"$bundle_complex_delegate_answers"

          jq -n \
            --arg pack_dir "$pack_test_dir" \
            '
            {
              wizard_id: "greentic-dev.wizard.launcher.main",
              schema_id: "greentic-dev.launcher.main",
              schema_version: "1.0.0",
              locale: "en",
              locks: {},
              answers: {
                selected_action: "pack",
                delegate_answer_document: {
                  wizard_id: "greentic-pack.wizard.run",
                  schema_id: "greentic-pack.wizard.answers",
                  schema_version: "1.0.0",
                  locale: "en",
                  locks: {},
                  answers: {
                    pack_dir: $pack_dir,
                    create_pack_id: "ai.greentic.e2e.wizard.pack",
                    create_pack_scaffold: true,
                    run_delegate_flow: false,
                    run_build: false,
                    run_doctor: false,
                    sign: false
                  }
                }
              }
            }
            ' >"$pack_launcher_apply"

          jq -n \
            --arg pack_dir "$pack_test_dir" \
            --argjson flow_plan "$(cat "$pack_flow_plan")" \
            '
            {
              wizard_id: "greentic-dev.wizard.launcher.main",
              schema_id: "greentic-dev.launcher.main",
              schema_version: "1.0.0",
              locale: "en",
              locks: {},
              answers: {
                selected_action: "pack",
                delegate_answer_document: {
                  wizard_id: "greentic-pack.wizard.run",
                  schema_id: "greentic-pack.wizard.answers",
                  schema_version: "1.0.0",
                  locale: "en",
                  locks: {},
                  answers: {
                    pack_dir: $pack_dir,
                    create_pack_id: "ai.greentic.e2e.wizard.pack",
                    create_pack_scaffold: true,
                    run_delegate_flow: true,
                    flow_wizard_answers: $flow_plan,
                    run_build: false,
                    run_doctor: false,
                    sign: false
                  }
                }
              }
            }
            ' >"$pack_launcher_delegate"

      - name: Run gtc wizard interactive test
        id: wizard_interactive
        if: runner.os == 'Linux' || runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          python3 fixtures/wizard/traversal.py

      - name: Run gtc wizard emit-answers test
        id: wizard_emit
        if: runner.os == 'Linux' || runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          python3 fixtures/wizard/emit_answers.py >"$WIZARD_EMIT_LOG"

          test -s "$WIZARD_EMIT_FILE"
          grep -q '"wizard_id": "greentic-dev.wizard.launcher.main"' "$WIZARD_EMIT_FILE"
          grep -q "\"selected_action\": \"bundle\"" "$WIZARD_EMIT_FILE"
          grep -Eq "\"(name|bundle_name)\": \"${WIZARD_BUNDLE_NAME}\"" "$WIZARD_EMIT_FILE"
          grep -q '"delegate_answer_document"' "$WIZARD_EMIT_FILE"

      - name: Run gtc wizard answers replay test
        id: wizard_replay
        if: runner.os == 'Linux' || runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          gtc wizard validate --answers "$WIZARD_REPLAY_ANSWERS" >"$WIZARD_BUNDLE_DIR.validate.log"
          grep -q '"program": "greentic-bundle"' "$WIZARD_BUNDLE_DIR.validate.log"

      - name: Run gtc wizard pack delegate-flow test
        id: wizard_pack_delegate_flow
        if: runner.os == 'Linux' || runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          gtc wizard --schema >"$WIZARD_E2E_ROOT/wizard-launcher.schema.json"
          grep -q '"greentic_pack_wizard_answers"' "$WIZARD_E2E_ROOT/wizard-launcher.schema.json"

          # Intentionally exercises launcher -> pack -> flow delegation path.
          # If this fails, it should surface as an e2e regression to triage.
          if ! gtc wizard apply \
            --answers "$WIZARD_PACK_LAUNCHER_DELEGATE" \
            --yes \
            --non-interactive \
            >"$WIZARD_E2E_ROOT/wizard-pack-delegate-flow.log" 2>&1; then
            if grep -q "unexpected argument '--execution'" "$WIZARD_E2E_ROOT/wizard-pack-delegate-flow.log"; then
              echo "Detected upstream regression: greentic-pack delegates to greentic-flow with unsupported '--execution' argument."
            fi
            cat "$WIZARD_E2E_ROOT/wizard-pack-delegate-flow.log"
            exit 1
          fi

      - name: Run gtc wizard pack build/doctor test
        id: wizard_pack_build
        if: runner.os == 'Linux' || runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          gtc wizard apply \
            --answers "$WIZARD_PACK_LAUNCHER_APPLY" \
            --yes \
            --non-interactive \
            >"$WIZARD_E2E_ROOT/wizard-pack-apply.log" 2>&1

          test -f "$WIZARD_PACK_TEST_DIR/pack.yaml"
          test -f "$WIZARD_PACK_TEST_DIR/flows/main.ygtc"

          greentic-flow wizard "$WIZARD_PACK_TEST_DIR" --answers "$WIZARD_PACK_FLOW_PLAN" \
            >"$WIZARD_E2E_ROOT/wizard-pack-flow.log" 2>&1

          greentic-pack update --in "$WIZARD_PACK_TEST_DIR" \
            >"$WIZARD_E2E_ROOT/wizard-pack-update.log" 2>&1

          greentic-pack build --in "$WIZARD_PACK_TEST_DIR" \
            >"$WIZARD_E2E_ROOT/wizard-pack-build.log" 2>&1

          greentic-pack doctor "$WIZARD_PACK_TEST_DIR" \
            >"$WIZARD_E2E_ROOT/wizard-pack-doctor.log" 2>&1

          test -s "$WIZARD_PACK_TEST_DIR/dist/pack.gtpack"

          grep -q 'component-adaptive-card' "$WIZARD_PACK_TEST_DIR/flows/main.ygtc"
          grep -q 'templates' "$WIZARD_PACK_TEST_DIR/flows/main.ygtc"
          grep -q 'component-qa' "$WIZARD_PACK_TEST_DIR/flows/qa.ygtc"
          grep -q 'Flows: 2' "$WIZARD_E2E_ROOT/wizard-pack-doctor.log"

      - name: Run gtc wizard bundle build/doctor/inspect test
        id: wizard_bundle_build
        if: runner.os == 'Linux' || runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          retry() {
            local attempts="$1"
            shift
            local n=1
            until "$@"; do
              if [[ "$n" -ge "$attempts" ]]; then
                return 1
              fi
              n=$((n + 1))
              sleep 2
            done
          }

          gtc wizard validate \
            --answers "$WIZARD_BUNDLE_COMPLEX_ANSWERS" \
            >"$WIZARD_E2E_ROOT/wizard-bundle-validate.log" 2>&1

          retry 3 greentic-bundle wizard apply \
            --answers "$WIZARD_BUNDLE_COMPLEX_DELEGATE_ANSWERS" \
            >"$WIZARD_E2E_ROOT/wizard-bundle-apply.log" 2>&1

          test -f "$WIZARD_BUNDLE_COMPLEX_DIR/bundle.yaml"
          test -f "$WIZARD_BUNDLE_COMPLEX_DIR/bundle.lock.json"

          retry 3 greentic-bundle build --root "$WIZARD_BUNDLE_COMPLEX_DIR" \
            >"$WIZARD_E2E_ROOT/wizard-bundle-build.log" 2>&1

          greentic-bundle doctor --root "$WIZARD_BUNDLE_COMPLEX_DIR" \
            >"$WIZARD_E2E_ROOT/wizard-bundle-doctor.log" 2>&1

          greentic-bundle inspect --root "$WIZARD_BUNDLE_COMPLEX_DIR" --json \
            >"$WIZARD_E2E_ROOT/wizard-bundle-inspect.json"

          grep -q '"ok": true' "$WIZARD_E2E_ROOT/wizard-bundle-doctor.log"
          grep -q '"messaging-webchat-gui"' "$WIZARD_E2E_ROOT/wizard-bundle-inspect.json"
          grep -q '"events-webhook"' "$WIZARD_E2E_ROOT/wizard-bundle-inspect.json"
          grep -q '"state-redis"' "$WIZARD_E2E_ROOT/wizard-bundle-inspect.json"
          grep -q '"oauth-oidc-generic"' "$WIZARD_E2E_ROOT/wizard-bundle-inspect.json"
          grep -q '"greentic.secrets.aws-sm.gtpack:latest"' "$WIZARD_E2E_ROOT/wizard-bundle-inspect.json"
          grep -q '"greentic.fixture.serverless.gtpack:latest"' "$WIZARD_E2E_ROOT/wizard-bundle-inspect.json"
          grep -q "\"${WIZARD_DEMO_APP_PACK_DIR}\"" "$WIZARD_E2E_ROOT/wizard-bundle-inspect.json"

      - name: Print tenant install context
        shell: bash
        env:
          GREENTIC_TENANT_TOKEN: ${{ secrets.GREENTIC_TENANT_TOKEN || secrets.GREENTIC_TENANT_KEY }}
        run: |
          set -euo pipefail

          tenant_len="$(printf '%s' "$GREENTIC_TENANT" | wc -c | tr -d ' ')"
          if command -v shasum >/dev/null 2>&1; then
            tenant_sha="$(printf '%s' "$GREENTIC_TENANT" | shasum -a 256 | awk '{print $1}')"
          elif command -v sha256sum >/dev/null 2>&1; then
            tenant_sha="$(printf '%s' "$GREENTIC_TENANT" | sha256sum | awk '{print $1}')"
          else
            tenant_sha="$(powershell -NoProfile -Command "[System.BitConverter]::ToString([System.Security.Cryptography.SHA256]::Create().ComputeHash([System.Text.Encoding]::UTF8.GetBytes($env:GREENTIC_TENANT))).Replace('-', '').ToLowerInvariant()")"
          fi

          echo "Resolved tenant length: ${tenant_len}"
          echo "Resolved tenant sha256[0:12]: ${tenant_sha:0:12}"
          echo "Expected tenant OCI ref: oci://ghcr.io/greentic-biz/customers-tools/${GREENTIC_TENANT}:latest"
          if [ -n "$GREENTIC_TENANT_TOKEN" ]; then
            echo "Tenant token set: yes"
          else
            echo "Tenant token set: no"
          fi

      - name: Run gtc tenant install
        shell: bash
        env:
          GREENTIC_TENANT_TOKEN: ${{ secrets.GREENTIC_TENANT_TOKEN || secrets.GREENTIC_TENANT_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$GREENTIC_TENANT_TOKEN" ]; then
            echo "GREENTIC_TENANT_TOKEN secret is required for tenant installation"
            exit 1
          fi

          if gtc install --help | grep -q -- '--token'; then
            gtc install --tenant "$GREENTIC_TENANT" --token "$GREENTIC_TENANT_TOKEN"
          elif gtc install --help | grep -q -- '--key'; then
            gtc install --tenant "$GREENTIC_TENANT" --key "$GREENTIC_TENANT_TOKEN"
          else
            echo "gtc install does not support tenant credentials for this version"
            exit 1
          fi

      - name: Check installed artifacts
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_ROOT="$HOME/.greentic/artifacts"

          if [[ ! -d "$ARTIFACT_ROOT" ]]; then
            echo "Artifact root missing: $ARTIFACT_ROOT"
            echo "Greentic home:"
            ls -la "$HOME/.greentic" || echo "~/.greentic missing"
            exit 0
          fi

          echo "Artifact root:"
          ls -la "$ARTIFACT_ROOT"

          for dir in components packs bundles; do
            path="$ARTIFACT_ROOT/$dir"
            if [[ -d "$path" ]]; then
              echo "$dir:"
              ls -la "$path"
            else
              echo "Missing artifact directory: $path"
            fi
          done

      - name: Check wizard test results
        if: ${{ always() && (runner.os == 'Linux' || runner.os == 'macOS') }}
        shell: bash
        run: |
          set -euo pipefail

          failures=0

          for result in \
            "wizard interactive:${{ steps.wizard_interactive.outcome }}" \
            "wizard emit-answers:${{ steps.wizard_emit.outcome }}" \
            "wizard replay:${{ steps.wizard_replay.outcome }}" \
            "wizard pack delegate-flow:${{ steps.wizard_pack_delegate_flow.outcome }}" \
            "wizard pack build:${{ steps.wizard_pack_build.outcome }}" \
            "wizard bundle build:${{ steps.wizard_bundle_build.outcome }}"; do
            echo "$result"
            case "$result" in
              *:success|*:skipped) ;;
              *)
                failures=$((failures + 1))
                ;;
            esac
          done

          if [[ "$failures" -gt 0 ]]; then
            echo "One or more wizard tests failed."
            exit 1
          fi

      - name: Check core install results
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail

          failures=0

          for result in \
            "public install:${{ steps.public_install.outcome }}" \
            "public doctor:${{ steps.public_doctor.outcome }}"; do
            echo "$result"
            case "$result" in
              *:success|*:skipped) ;;
              *)
                failures=$((failures + 1))
                ;;
            esac
          done

          if [[ "$failures" -gt 0 ]]; then
            echo "One or more core install checks failed."
            exit 1
          fi
