name: Nightly E2E Verification

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      gtc_version:
        description: 'gtc version to test'
        default: '0.9.5'
        required: false
      greentic_tenant:
        description: 'Tenant name for gtc install --tenant'
        default: '3point'
        required: false

env:
  GTC_VERSION: ${{ github.event.inputs.gtc_version || '0.9.5' }}
  GREENTIC_TENANT: ${{ github.event.inputs.greentic_tenant || vars.GREENTIC_TENANT || '3point' }}

jobs:
  e2e-tests:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux (x64)
            os: linux
            runner: ubuntu-24.04
            arch: x64
          - label: Linux (arm64)
            os: linux
            runner: ubuntu-24.04-arm
            arch: arm64
          - label: macOS 15 (arm64)
            os: macos-15
            runner: macos-15
            arch: arm64
          - label: macOS 15 (x64)
            os: macos-15
            runner: macos-15-intel
            arch: x64
          - label: Windows (x64)
            os: windows
            runner: windows-latest
            arch: x64
          - label: Windows (arm64)
            os: windows
            runner: windows-11-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2

      - name: Install cargo-binstall
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cargo install cargo-binstall --locked
          else
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          fi

      - name: Install gtc
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          cargo binstall -y gtc@$GTC_VERSION

      - name: Verify gtc version
        shell: bash
        run: |
          gtc --version

      - name: Test gtc install (Public)
        shell: bash
        run: |
          set -euo pipefail

          gtc install

      - name: Run gtc doctor
        shell: bash
        run: |
          gtc doctor

      - name: Install expect
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y expect
          else
            brew install expect
          fi

      - name: Smoke test gtc wizard
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          cat >/tmp/gtc-wizard-smoke.expect <<'EOF'
          set timeout 15
          spawn gtc wizard
          expect {
            -re "Greentic|wizard|menu" {}
            timeout { exit 1 }
          }
          send "q\r"
          expect eof
          EOF

          expect /tmp/gtc-wizard-smoke.expect

      - name: Verify gtc wizard launches
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          cat >/tmp/gtc-wizard-router.expect <<'EOF'
          set timeout 15
          spawn gtc wizard --debug-router
          expect {
            -re "Greentic Developer Wizard|Build / Update a Pack|Build / Update a Production Bundle" {}
            timeout { exit 1 }
          }
          send "0\r"
          expect eof
          EOF

          expect /tmp/gtc-wizard-router.expect

      - name: Test gtc wizard navigation
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          cat >/tmp/gtc-wizard-nav.expect <<'EOF'
          set timeout 15
          spawn gtc wizard
          expect {
            -re "Greentic|wizard|menu" {}
            timeout { exit 1 }
          }
          send "\033\[B"
          send "\033\[A"
          send "q\r"
          expect eof
          EOF

          expect /tmp/gtc-wizard-nav.expect

      - name: Print tenant install context
        shell: bash
        env:
          GREENTIC_TENANT_TOKEN: ${{ secrets.GREENTIC_TENANT_TOKEN || secrets.GREENTIC_TENANT_KEY }}
        run: |
          set -euo pipefail

          tenant_len="$(printf '%s' "$GREENTIC_TENANT" | wc -c | tr -d ' ')"
          tenant_sha="$(printf '%s' "$GREENTIC_TENANT" | shasum -a 256 | awk '{print $1}')"

          echo "Resolved tenant length: ${tenant_len}"
          echo "Resolved tenant sha256[0:12]: ${tenant_sha:0:12}"
          echo "Expected tenant OCI ref: oci://ghcr.io/greentic-biz/customers-tools/${GREENTIC_TENANT}:latest"
          if [ -n "$GREENTIC_TENANT_TOKEN" ]; then
            echo "Tenant token set: yes"
          else
            echo "Tenant token set: no"
          fi

      - name: Test gtc install --tenant
        shell: bash
        env:
          GREENTIC_TENANT_TOKEN: ${{ secrets.GREENTIC_TENANT_TOKEN || secrets.GREENTIC_TENANT_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$GREENTIC_TENANT_TOKEN" ]; then
            echo "GREENTIC_TENANT_TOKEN secret is required for tenant installation"
            exit 1
          fi

          if gtc install --help | grep -q -- '--token'; then
            gtc install --tenant "$GREENTIC_TENANT" --token "$GREENTIC_TENANT_TOKEN"
          elif gtc install --help | grep -q -- '--key'; then
            gtc install --tenant "$GREENTIC_TENANT" --key "$GREENTIC_TENANT_TOKEN"
          else
            echo "gtc install does not support tenant credentials for this version"
            exit 1
          fi

      - name: Check Artifacts
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_ROOT="$HOME/.greentic/artifacts"

          if [[ ! -d "$ARTIFACT_ROOT" ]]; then
            echo "Artifact root missing: $ARTIFACT_ROOT"
            echo "Greentic home:"
            ls -la "$HOME/.greentic" || echo "~/.greentic missing"
            exit 0
          fi

          echo "Artifact root:"
          ls -la "$ARTIFACT_ROOT"

          for dir in components packs bundles; do
            path="$ARTIFACT_ROOT/$dir"
            if [[ -d "$path" ]]; then
              echo "$dir:"
              ls -la "$path"
            else
              echo "Missing artifact directory: $path"
            fi
          done
