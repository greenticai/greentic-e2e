name: Nightly E2E Verification

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      test_tenant:
        description: 'Tenant name for gtc install --tenant'
        default: 'acme'
        required: false

env:
  GTC_VERSION: 0.9.5

jobs:
  e2e-tests:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-latest
            arch: arm64
          - os: macos-15
            arch: arm64
          - os: windows-latest
            arch: x64
          - os: windows-latest
            arch: x86

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2

      - name: Generate access token for BIZ organization
        id: generate_biz_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BIZ_APP_ID }}
          private-key: ${{ secrets.BIZ_APP_PRIVATE_KEY }}
          owner: greentic-biz

      - name: Install cargo-binstall
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            curl -L -o binstall.zip https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-pc-windows-msvc.zip
            unzip binstall.zip
            mv cargo-binstall.exe /usr/bin/ || cp cargo-binstall.exe /c/Users/runneradmin/.cargo/bin/
          else
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          fi

      - name: Install gtc
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CARGO_REGISTRY_TOKEN: ${{ steps.generate_biz_token.outputs.token }}
        run: |
          cargo binstall -y gtc@$GTC_VERSION

      - name: Verify gtc version
        shell: bash
        run: |
          gtc --version

      - name: Test gtc install (Public)
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CARGO_REGISTRY_TOKEN: ${{ steps.generate_biz_token.outputs.token }}
        run: |
          gtc install

      - name: Run gtc doctor
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CARGO_REGISTRY_TOKEN: ${{ steps.generate_biz_token.outputs.token }}
        run: |
          gtc doctor

      - name: Test gtc install --tenant
        shell: bash
        env:
          TEST_TENANT: ${{ github.event.inputs.test_tenant || 'acme' }}
          GREENTIC_TENANT_KEY: ${{ secrets.GREENTIC_TENANT_KEY }}
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CARGO_REGISTRY_TOKEN: ${{ steps.generate_biz_token.outputs.token }}
        run: |
          if [ -z "$GREENTIC_TENANT_KEY" ]; then
            echo "Skipping tenant installation - GREENTIC_TENANT_KEY not set"
            exit 0
          fi
          gtc install --tenant "$TEST_TENANT" --key "$GREENTIC_TENANT_KEY"

      - name: Check Artifacts
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_ROOT="$HOME/.greentic/artifacts"
          test -d "$ARTIFACT_ROOT"

          echo "Artifact root:"
          ls -la "$ARTIFACT_ROOT"

          for dir in components packs bundles; do
            path="$ARTIFACT_ROOT/$dir"
            if [[ -d "$path" ]]; then
              echo "$dir:"
              ls -la "$path"
            else
              echo "Missing artifact directory: $path"
            fi
          done
