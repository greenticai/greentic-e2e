name: Nightly E2E Verification

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      gtc_version:
        description: 'gtc version to test'
        default: '0.9.5'
        required: false
      test_tenant:
        description: 'Tenant name for gtc install --tenant'
        default: '3point'
        required: false

env:
  GTC_VERSION: ${{ github.event.inputs.gtc_version || '0.9.5' }}

jobs:
  e2e-tests:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-latest
            arch: arm64
          - os: macos-15
            arch: arm64
          - os: windows-latest
            arch: x64
          - os: windows-latest
            arch: x86

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2

      - name: Install cargo-binstall
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            curl -L -o binstall.zip https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-pc-windows-msvc.zip
            unzip binstall.zip
            mv cargo-binstall.exe /usr/bin/ || cp cargo-binstall.exe /c/Users/runneradmin/.cargo/bin/
          else
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          fi

      - name: Install gtc
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          cargo binstall -y gtc@$GTC_VERSION

      - name: Verify gtc version
        shell: bash
        run: |
          gtc --version

      - name: Test gtc install (Public)
        shell: bash
        run: |
          set -euo pipefail

          gtc install

      - name: Run gtc doctor
        shell: bash
        run: |
          gtc doctor

      - name: Install expect
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y expect
          else
            brew install expect
          fi

      - name: Smoke test gtc wizard
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          cat >/tmp/gtc-wizard-smoke.expect <<'EOF'
          set timeout 15
          spawn gtc wizard
          expect {
            -re "Greentic|wizard|menu" {}
            timeout { exit 1 }
          }
          send "q\r"
          expect eof
          EOF

          expect /tmp/gtc-wizard-smoke.expect

      - name: Verify gtc wizard launches
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          cat >/tmp/gtc-wizard-router.expect <<'EOF'
          set timeout 15
          spawn gtc wizard --debug-router
          expect {
            -re "Greentic Developer Wizard|Build / Update a Pack|Build / Update a Production Bundle" {}
            timeout { exit 1 }
          }
          send "0\r"
          expect eof
          EOF

          expect /tmp/gtc-wizard-router.expect

      - name: Test gtc wizard navigation
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          cat >/tmp/gtc-wizard-nav.expect <<'EOF'
          set timeout 15
          spawn gtc wizard
          expect {
            -re "Greentic|wizard|menu" {}
            timeout { exit 1 }
          }
          send "\033\[B"
          send "\033\[A"
          send "q\r"
          expect eof
          EOF

          expect /tmp/gtc-wizard-nav.expect

      - name: Test gtc install --tenant
        shell: bash
        env:
          TEST_TENANT: ${{ github.event.inputs.test_tenant || '3point' }}
          GREENTIC_TENANT_KEY: ${{ secrets.GREENTIC_TENANT_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$GREENTIC_TENANT_KEY" ]; then
            echo "Skipping tenant installation - GREENTIC_TENANT_KEY not set"
            exit 0
          fi

          gtc install --tenant "$TEST_TENANT" --key "$GREENTIC_TENANT_KEY"

      - name: Check Artifacts
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_ROOT="$HOME/.greentic/artifacts"

          if [[ ! -d "$ARTIFACT_ROOT" ]]; then
            echo "Artifact root missing: $ARTIFACT_ROOT"
            echo "Greentic home:"
            ls -la "$HOME/.greentic" || echo "~/.greentic missing"
            exit 0
          fi

          echo "Artifact root:"
          ls -la "$ARTIFACT_ROOT"

          for dir in components packs bundles; do
            path="$ARTIFACT_ROOT/$dir"
            if [[ -d "$path" ]]; then
              echo "$dir:"
              ls -la "$path"
            else
              echo "Missing artifact directory: $path"
            fi
          done
