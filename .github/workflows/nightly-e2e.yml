name: Nightly E2E Verification

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      gtc_version:
        description: 'gtc version to test'
        default: 'latest'
        required: false
      greentic_tenant:
        description: 'Tenant name for gtc install --tenant'
        default: '3point'
        required: false

env:
  GTC_VERSION: ${{ github.event.inputs.gtc_version || 'latest' }}
  GREENTIC_TENANT: ${{ github.event.inputs.greentic_tenant || vars.GREENTIC_TENANT || '3point' }}

jobs:
  e2e-tests:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux (x64)
            os: linux
            runner: ubuntu-24.04
            arch: x64
          - label: Linux (arm64)
            os: linux
            runner: ubuntu-24.04-arm
            arch: arm64
          - label: macOS 15 (arm64)
            os: macos-15
            runner: macos-15
            arch: arm64
          - label: macOS 15 (x64)
            os: macos-15
            runner: macos-15-intel
            arch: x64
          - label: Windows (x64)
            os: windows
            runner: windows-latest
            arch: x64
          - label: Windows (arm64)
            os: windows
            runner: windows-11-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap toolchain
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v rustup >/dev/null 2>&1; then
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              curl -fsSL -o rustup-init.exe https://win.rustup.rs/x86_64
              ./rustup-init.exe -y --profile minimal --default-toolchain 1.91.0
              export PATH="$HOME/.cargo/bin:$PATH"
            else
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain 1.91.0
              export PATH="$HOME/.cargo/bin:$PATH"
            fi
          fi

          rustup toolchain install 1.91.0 --profile minimal
          rustup default 1.91.0
          rustup target add wasm32-wasip2 --toolchain 1.91.0

          rustc --version
          cargo --version

      - name: Install cargo-binstall
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cargo install cargo-binstall --locked
          else
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          fi

      - name: Install gtc CLI
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          if [[ -z "${GTC_VERSION}" || "${GTC_VERSION}" == "latest" ]]; then
            cargo binstall -y gtc
          else
            cargo binstall -y "gtc@${GTC_VERSION}"
          fi

      - name: Verify gtc version
        shell: bash
        run: |
          gtc --version

      - name: Run gtc public install
        shell: bash
        run: |
          set -euo pipefail

          gtc install

      - name: Run gtc doctor
        shell: bash
        run: |
          gtc doctor

      - name: Install expect for wizard tests
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y expect
          else
            brew install expect
          fi

      - name: Prepare wizard test workspace
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          root="$(mktemp -d "${RUNNER_TEMP:-${TMPDIR:-/tmp}}/gtc-wizard-e2e.XXXXXX")"
          {
            echo "WIZARD_E2E_ROOT=${root}"
            echo "WIZARD_PACK_DIR=/tmp/test-pack"
            echo "WIZARD_COMPONENT_DIR=${root}/component"
            echo "WIZARD_BUNDLE_DIR=${root}/bundle"
            echo "WIZARD_ANSWERS=${root}/answers.json"
          } >>"$GITHUB_ENV"

          rm -rf /tmp/test-pack

      - name: Run gtc wizard interactive test
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          cat >/tmp/gtc-wizard-traversal.expect <<'EOF'
          set timeout 30
          set pack_dir $env(WIZARD_PACK_DIR)

          spawn gtc wizard --debug-router
          expect {
            -re "Router exec: greentic-dev" {}
            timeout { exit 1 }
          }

          expect "Select option:"
          send "1\r"

          expect "> "
          send "1\r"
          expect "Pack id"
          expect "> "
          send "ai.greentic.e2e.pack\r"
          expect "Pack directory"
          expect "> "
          send "$pack_dir\r"

          expect "> "
          send "1\r"
          expect "Select action"
          expect "> "
          send "0\r"

          expect "> "
          send "2\r"
          expect "wizard interactive mode"
          expect "Select an option"
          send "0\r"

          expect "> "
          send "0\r"
          expect "> "
          send "0\r"
          expect "Select option:"
          send "2\r"
          expect "Bundle Wizard"
          expect "Select number or value:"
          send "0\r"
          expect "Select option:"
          send "0\r"
          expect eof
          EOF

          expect /tmp/gtc-wizard-traversal.expect

      - name: Run gtc wizard emit-answers test
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          cat >/tmp/gtc-wizard-emit.expect <<'EOF'
          set timeout 60
          set pack_dir $env(WIZARD_PACK_DIR)
          set component_dir $env(WIZARD_COMPONENT_DIR)
          set bundle_dir $env(WIZARD_BUNDLE_DIR)
          set answers_path $env(WIZARD_ANSWERS)

          spawn gtc wizard --emit-answers $answers_path
          expect {
            -re "Greentic Developer Wizard" {}
            timeout { exit 1 }
          }

          expect "Select option:"
          send "1\r"
          expect "> "
          send "1\r"
          expect "Pack id"
          expect "> "
          send "ai.greentic.e2e.pack\r"
          expect "Pack directory"
          expect "> "
          send "$pack_dir\r"

          expect "> "
          send "1\r"
          expect "Select action"
          expect "> "
          send "1\r"
          expect "Flow scope"
          expect "Select scope"
          expect "> "
          send "1\r"
          expect "Flow type"
          expect "Select flow type"
          expect "> "
          send "1\r"
          expect "Flow name"
          expect "> "
          send "hello-flow\r"
          expect "Select action"
          expect "> "
          send "0\r"

          expect "> "
          send "2\r"
          expect "Select an option"
          send "1\r"
          expect "component name"
          send "hello\r"
          expect "output dir"
          send "$component_dir\r"
          expect "Advanced setup"
          send "n\r"
          expect "Select an option"
          send "0\r"

          expect "> "
          send "M\r"
          expect "Select option:"
          send "2\r"
          expect "Select number or value:"
          send "1\r"
          expect "Bundle name:"
          send "e2e-bundle\r"
          expect "Bundle id:"
          send "ai.greentic.e2e.bundle\r"
          expect "Output directory:"
          send "$bundle_dir\r"

          expect "Select number or value:"
          send "1\r"
          expect "Enter app pack reference or local path:"
          send "$pack_dir\r"
          expect "Select number or value:"
          send "1\r"
          expect "Select number or value:"
          send "1\r"
          expect "Select number or value:"
          send "4\r"
          expect "Select number or value:"
          send "4\r"
          expect "Select number or value:"
          send "3\r"

          expect {
            -re "Select option:" {
              send "0\r"
              expect eof
            }
            eof {}
            timeout { exit 1 }
          }
          EOF

          expect /tmp/gtc-wizard-emit.expect

          test -f "$WIZARD_ANSWERS"
          grep -q 'ai.greentic.e2e.pack' "$WIZARD_ANSWERS"
          grep -q 'ai.greentic.e2e.bundle' "$WIZARD_ANSWERS"

      - name: Run gtc wizard answers replay test
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          gtc wizard validate --answers "$WIZARD_ANSWERS"
          rm -rf "$WIZARD_PACK_DIR" "$WIZARD_COMPONENT_DIR" "$WIZARD_BUNDLE_DIR"
          gtc wizard apply --answers "$WIZARD_ANSWERS" --non-interactive --yes

          test -d "$WIZARD_PACK_DIR"
          test -f "$WIZARD_BUNDLE_DIR/bundle.yaml"

      - name: Print tenant install context
        shell: bash
        env:
          GREENTIC_TENANT_TOKEN: ${{ secrets.GREENTIC_TENANT_TOKEN || secrets.GREENTIC_TENANT_KEY }}
        run: |
          set -euo pipefail

          tenant_len="$(printf '%s' "$GREENTIC_TENANT" | wc -c | tr -d ' ')"
          tenant_sha="$(printf '%s' "$GREENTIC_TENANT" | shasum -a 256 | awk '{print $1}')"

          echo "Resolved tenant length: ${tenant_len}"
          echo "Resolved tenant sha256[0:12]: ${tenant_sha:0:12}"
          echo "Expected tenant OCI ref: oci://ghcr.io/greentic-biz/customers-tools/${GREENTIC_TENANT}:latest"
          if [ -n "$GREENTIC_TENANT_TOKEN" ]; then
            echo "Tenant token set: yes"
          else
            echo "Tenant token set: no"
          fi

      - name: Run gtc tenant install
        shell: bash
        env:
          GREENTIC_TENANT_TOKEN: ${{ secrets.GREENTIC_TENANT_TOKEN || secrets.GREENTIC_TENANT_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$GREENTIC_TENANT_TOKEN" ]; then
            echo "GREENTIC_TENANT_TOKEN secret is required for tenant installation"
            exit 1
          fi

          if gtc install --help | grep -q -- '--token'; then
            gtc install --tenant "$GREENTIC_TENANT" --token "$GREENTIC_TENANT_TOKEN"
          elif gtc install --help | grep -q -- '--key'; then
            gtc install --tenant "$GREENTIC_TENANT" --key "$GREENTIC_TENANT_TOKEN"
          else
            echo "gtc install does not support tenant credentials for this version"
            exit 1
          fi

      - name: Check installed artifacts
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_ROOT="$HOME/.greentic/artifacts"

          if [[ ! -d "$ARTIFACT_ROOT" ]]; then
            echo "Artifact root missing: $ARTIFACT_ROOT"
            echo "Greentic home:"
            ls -la "$HOME/.greentic" || echo "~/.greentic missing"
            exit 0
          fi

          echo "Artifact root:"
          ls -la "$ARTIFACT_ROOT"

          for dir in components packs bundles; do
            path="$ARTIFACT_ROOT/$dir"
            if [[ -d "$path" ]]; then
              echo "$dir:"
              ls -la "$path"
            else
              echo "Missing artifact directory: $path"
            fi
          done
